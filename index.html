
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brahan Sovereign Console v.92</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald-primary: #22c55e;
      --alert-red: #ef4444;
      --sovereign-gold: #eab308;
      --slate-abyssal: #0f172a;
      --bg-color: #0f172a;
      --text-color: #94a3b8;
      --border-color: rgba(34, 197, 94, 0.1);
      --panel-bg: rgba(15, 23, 42, 0.5);
      --accent-color: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --panel-border: rgba(34, 197, 94, 0.2);
      --card-bg: rgba(15, 23, 42, 0.8);
    }

    [data-theme='CLEAN'] {
      --emerald-primary: #10b981;
      --alert-red: #dc2626;
      --sovereign-gold: #d97706;
      --slate-abyssal: #f8fafc;
      --bg-color: #f8fafc;
      --text-color: #1e293b;
      --border-color: #e2e8f0;
      --panel-bg: #ffffff;
      --accent-color: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.1);
      --panel-border: #e2e8f0;
      --card-bg: #ffffff;
    }

    [data-theme='HIGH_CONTRAST'] {
      --emerald-primary: #ffffff;
      --alert-red: #ff0000;
      --sovereign-gold: #ffff00;
      --slate-abyssal: #000000;
      --bg-color: #000000;
      --text-color: #ffffff;
      --border-color: #ffffff;
      --panel-bg: #000000;
      --accent-color: #ffffff;
      --accent-glow: transparent;
      --panel-border: #ffffff;
      --card-bg: #000000;
    }

    [data-theme='TECHNICAL'] {
      --emerald-primary: #a3e635;
      --alert-red: #f87171;
      --sovereign-gold: #fde047;
      --slate-abyssal: #18181b;
      --bg-color: #18181b;
      --text-color: #d4d4d8;
      --border-color: #3f3f46;
      --panel-bg: #27272a;
      --accent-color: #a3e635;
      --accent-glow: rgba(163, 230, 53, 0.2);
      --panel-border: #3f3f46;
      --card-bg: #27272a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      overflow: hidden;
      height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    #root {
      width: 100vw;
      height: 100vh;
      /* Screen Curvature Effect - only in forensic/technical */
      border-radius: 0.8rem;
      box-shadow: inset 0 0 50px rgba(16, 185, 129, 0.1), inset 0 0 100px rgba(16, 185, 129, 0.05);
      transform: perspective(1000px) rotateX(0.2deg) rotateY(-0.2deg) scale(0.999);
      overflow: hidden;
      filter: contrast(1.03) brightness(1.03);
      transition: transform 0.3s ease-out, border-radius 0.3s ease, box-shadow 0.3s ease;
    }

    [data-theme='CLEAN'] #root, [data-theme='HIGH_CONTRAST'] #root {
      border-radius: 0;
      box-shadow: none;
      transform: none;
      filter: none;
    }

    .font-terminal {
      font-family: 'Fira Code', monospace;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--emerald-primary);
    }

    .animate-spin-slow {
      animation: spin 60s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* CRT Scanline Overlay */
    #crt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                  linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 2px, 3px 100%;
      opacity: 0.15;
      animation: crt-flicker 0.1s infinite alternate;
      will-change: opacity;
    }

    #crt-overlay::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.4) 100%);
      z-index: 10000;
      pointer-events: none;
    }

    #crt-overlay::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 0%, rgba(34, 197, 94, 0.03) 50%, rgba(18, 16, 16, 0) 100%);
      background-size: 100% 20%;
      animation: scanline-move 8s linear infinite;
      will-change: transform;
    }

    @keyframes scanline-move {
      0% { transform: translate3d(0, -100%, 0); }
      100% { transform: translate3d(0, 100%, 0); }
    }

    @keyframes crt-flicker {
      0% { opacity: 0.14; }
      100% { opacity: 0.16; }
    }

    @keyframes subtle-pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }
    .animate-subtle-pulse {
      animation: subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@playwright/test": "https://esm.sh/@playwright/test@^1.58.0",
    "plotly.js-dist-min": "https://esm.sh/plotly.js-dist-min@^3.3.1"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <div id="crt-overlay"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
