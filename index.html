
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brahan Sovereign Console v.92</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald-primary: #22c55e;
      --alert-red: #ef4444;
      --sovereign-gold: #eab308;
      --slate-abyssal: #0f172a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--slate-abyssal);
      color: #94a3b8;
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }
    
    #root {
      width: 100vw;
      height: 100vh;
      /* Screen Curvature Effect */
      border-radius: 0.8rem; /* Subtle rounded corners */
      box-shadow: inset 0 0 50px rgba(16, 185, 129, 0.1), inset 0 0 100px rgba(16, 185, 129, 0.05); /* Inner glow */
      transform: perspective(1000px) rotateX(0.2deg) rotateY(-0.2deg) scale(0.999); /* Slight 3D skew and scale for convexity */
      overflow: hidden; /* Ensure content stays within curved bounds */
      filter: contrast(1.03) brightness(1.03); /* Slight CRT screen pop */
      transition: transform 0.3s ease-out; /* Smooth transition for potential future interactions */
    }

    .font-terminal {
      font-family: 'Fira Code', monospace;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--emerald-primary);
    }

    .animate-spin-slow {
      animation: spin 60s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* CRT Scanline Overlay */
    #crt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none; /* Allows clicks/interactions with elements below */
      z-index: 9999; /* Ensure it's on top */
      opacity: 0.1; /* Subtle overall opacity */
      
      /* Horizontal scanlines & very subtle RGB glow */
      background: 
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), /* Horizontal dark lines */
        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); /* Vertical RGB tint */
      background-size: 100% 1px, 2px 100%; /* Fine horizontal lines, thin vertical RGB */
      
      animation: 
        crt-scanlines 1s steps(60) infinite, /* Subtle vertical scanline movement */
        crt-flicker 0.1s infinite alternate; /* Very fast, subtle opacity flicker */
    }

    @keyframes crt-scanlines {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 100%, 0 0; }
    }

    @keyframes crt-flicker {
      0% { opacity: 0.09; }
      100% { opacity: 0.11; }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@playwright/test": "https://esm.sh/@playwright/test@^1.58.0",
    "plotly.js-dist-min": "https://esm.sh/plotly.js-dist-min@^3.3.1"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <div id="crt-overlay"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
